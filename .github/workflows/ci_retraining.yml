name: CI Retraining & Docker Build

on:
  push:
    paths:
      - 'MLProject/**' # Jalan otomatis kalau ada perubahan di folder MLProject
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0 scikit-learn pandas numpy

    - name: Run Retraining Model
      run: |
        cd MLProject
        python modelling.py

    - name: Build Docker Image with MLflow
      run: |
        cd MLProject
        # Perintah ini wajib ada untuk Kriteria 3 Advance
        mlflow models build-docker -m saved_model -n ${{ secrets.DOCKERHUB_USERNAME }}/housing-model:latest

    - name: Login to Docker Hub
      run: |
        echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

    - name: Push Image to Docker Hub
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/housing-model:latest

    - name: Upload Artifact to GitHub (Commit)
      run: |
        # Sesuai syarat: Menyimpan artefak ke GitHub yang sama
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add MLProject/saved_model/
        git commit -m "Upload model artifact to GitHub via CI" || echo "No changes to commit"
        git push