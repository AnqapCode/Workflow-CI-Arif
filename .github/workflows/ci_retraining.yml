name: Workflow CI MLProject

on:
  push:
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Sesuai gambar: Checkout repository
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2. Sesuai gambar: Set up Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.7'

    # 3. Sesuai gambar: Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0 scikit-learn pandas numpy

    # 4. Sesuai gambar: Run MLflow Project
    - name: Run MLflow Project
      run: |
        cd MLProject
        # Ini akan otomatis membaca file MLProject dan menjalankan modelling.py
        mlflow run . 

    # 5. Sesuai gambar: Upload to GitHub (Menyimpan artefak ke repo yang sama)
    - name: Upload to GitHub
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add MLProject/saved_model/
        git commit -m "Upload artifact model dari MLflow Project" || echo "No changes to commit"
        git push

    # 6. Sesuai gambar: Build Docker Image
    - name: Build Docker Image
      run: |
        cd MLProject
        # Membungkus model yang ada di folder saved_model menjadi Docker Image
        mlflow models build-docker -m saved_model -n ${{ secrets.DOCKERHUB_USERNAME }}/housing-model:latest

    # 7. Sesuai gambar: Push Docker Image to Dockerhub
    - name: Push Docker Image to Dockerhub
      run: |
        # Login menggunakan rahasia (secrets) yang sudah kita buat
        echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
        # Mendorong image ke Docker Hub
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/housing-model:latest